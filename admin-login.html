<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h2 { color: #1a1a2e; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .error { color: #e74c3c; margin-top: 10px; font-size: 14px; }
        .note { font-size: 12px; color: #666; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🔐 Admin Access</h2>
        <p>Enter your Admin ID</p>
        <input type="text" id="adminId" placeholder="Admin ID (ADMIN001, ADMIN002, MASTER2024)">
        <button onclick="verify()">Verify & Enter</button>
        <div id="message" class="error"></div>
        <div class="note">Only authorized admins can access</div>
    </div>
    <script>
        async function verify() {
            const adminId = document.getElementById('adminId').value.trim();
            const msg = document.getElementById('message');
            if (!adminId) { msg.innerText = 'Enter Admin ID'; return; }
            const res = await fetch('/api/admin/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ adminId })
            });
            const data = await res.json();
            if (data.success) {
                localStorage.setItem('adminToken', data.token);
                localStorage.setItem('adminId', adminId);
                window.location.href = '/admin-panel.html';
            } else {
                msg.innerText = data.error || 'Invalid Admin ID';
            }
        }
        if (localStorage.getItem('adminToken')) window.location.href = '/admin-panel.html';
    </script>
</body>
</html>
