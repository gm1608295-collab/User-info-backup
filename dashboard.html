<!DOCTYPE html>
<html>
<head>
    <title>Myanmar Time</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .container { text-align: center; max-width: 500px; width: 100%; }
        .clock { width: 300px; height: 300px; margin: 0 auto 30px; }
        @media (min-width: 500px) { .clock { width: 380px; height: 380px; } }
        canvas { width: 100%; height: 100%; background: white; border-radius: 50%; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .card { background: rgba(255,255,255,0.95); border-radius: 20px; padding: 25px; }
        .card h2 { color: #1a1a2e; margin-bottom: 10px; }
        .date { font-size: 18px; color: #2c3e50; margin: 15px 0; padding: 10px; background: #f0f0f0; border-radius: 10px; }
        button { padding: 12px 25px; border: none; border-radius: 50px; font-size: 16px; cursor: pointer; }
        .logout { background: #e74c3c; color: white; }
        .admin-link { margin-top: 15px; }
        .admin-link a { color: #3498db; font-size: 12px; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="clock"><canvas id="clockCanvas" width="400" height="400"></canvas></div>
        <div class="card">
            <h2>မင်္ဂလာပါ၊ <span id="userName">ဧည့်သည်</span>!</h2>
            <p>မြန်မာစံတော်ချိန်</p>
            <div class="date" id="dateInfo"></div>
            <button class="logout" onclick="logout()">ထွက်မည်</button>
            <div class="admin-link"><a href="/admin-login.html">🔐 Admin Panel</a></div>
        </div>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let token = urlParams.get('token');
        if (token) {
            localStorage.setItem('token', token);
            try {
                let payload = JSON.parse(atob(token.split('.')[1]));
                localStorage.setItem('role', payload.role || 'user');
            } catch(e) {}
            window.history.replaceState({}, document.title, '/dashboard.html');
        } else {
            token = localStorage.getItem('token');
        }
        if (!token) window.location.href = '/';
        try {
            let payload = JSON.parse(atob(token.split('.')[1]));
            document.getElementById('userName').innerText = payload.email || payload.name || 'User';
        } catch(e) {}
        
        const canvas = document.getElementById('clockCanvas');
        const ctx = canvas.getContext('2d');
        function resize() { let s = document.querySelector('.clock').clientWidth; canvas.width = s; canvas.height = s; draw(); }
        function draw() {
            let now = new Date(), my = new Date(now.getTime() + (6.5 * 3600000));
            let h = my.getUTCHours(), m = my.getUTCMinutes(), s = my.getUTCSeconds();
            let size = canvas.width, cx = size/2, cy = size/2, r = size * 0.42;
            ctx.clearRect(0,0,size,size);
            ctx.beginPath(); ctx.arc(cx,cy,r+8,0,2*Math.PI); ctx.fillStyle='#fff'; ctx.fill(); ctx.strokeStyle='#2c3e50'; ctx.lineWidth=3; ctx.stroke();
            ctx.font = `bold ${size*0.07}px Arial`; ctx.fillStyle='#1a1a2e'; ctx.textAlign='center'; ctx.textBaseline='middle';
            for(let i=1;i<=12;i++){ let a=(i*30-90)*Math.PI/180, rr=r-size*0.08; ctx.fillText(i, cx+rr*Math.cos(a), cy+rr*Math.sin(a)); }
            for(let i=0;i<60;i++){ let a=(i*6-90)*Math.PI/180, s1=r-(i%5===0?size*0.05:size*0.03), e=r-size*0.02; ctx.beginPath(); ctx.moveTo(cx+s1*Math.cos(a),cy+s1*Math.sin(a)); ctx.lineTo(cx+e*Math.cos(a),cy+e*Math.sin(a)); ctx.strokeStyle=i%5===0?'#2c3e50':'#999'; ctx.lineWidth=i%5===0?2:1; ctx.stroke(); }
            let ha=(h%12*30+m*0.5-90)*Math.PI/180; ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+r*0.5*Math.cos(ha),cy+r*0.5*Math.sin(ha)); ctx.lineWidth=size*0.02; ctx.strokeStyle='#1a1a2e'; ctx.stroke();
            let ma=(m*6-90)*Math.PI/180; ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+r*0.75*Math.cos(ma),cy+r*0.75*Math.sin(ma)); ctx.lineWidth=size*0.012; ctx.strokeStyle='#2c3e50'; ctx.stroke();
            let sa=(s*6-90)*Math.PI/180; ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+r*0.85*Math.cos(sa),cy+r*0.85*Math.sin(sa)); ctx.lineWidth=size*0.005; ctx.strokeStyle='#e74c3c'; ctx.stroke();
            ctx.beginPath(); ctx.arc(cx,cy,size*0.025,0,2*Math.PI); ctx.fillStyle='#e74c3c'; ctx.fill();
            let days=['တနင်္ဂနွေ','တနင်္လာ','အင်္ဂါ','ဗုဒ္ဓဟူး','ကြာသပတေး','သောကြာ','စနေ'];
            let months=['ဇန်နဝါရီ','ဖေဖော်ဝါရီ','မတ်','ဧပြီ','မေ','ဇွန်','ဇူလိုင်','ဩဂုတ်','စက်တင်ဘာ','အောက်တိုဘာ','နိုဝင်ဘာ','ဒီဇင်ဘာ'];
            document.getElementById('dateInfo').innerHTML = `${days[my.getUTCDay()]}၊ ${my.getUTCDate()} ${months[my.getUTCMonth()]} ${my.getUTCFullYear()}<br>${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }
        setInterval(draw, 1000);
        window.addEventListener('resize', resize);
        resize();
        async function logout() { await fetch('/api/logout',{method:'POST'}); localStorage.clear(); window.location.href='/'; }
    </script>
</body>
</html>
