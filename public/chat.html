<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat Test</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="chat.css">
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>💬 Chats</h2>
                <button class="new-chat-btn" onclick="createRoom()"><i class="fas fa-plus"></i></button>
            </div>
            <div class="room-list" id="roomList">
                <div class="empty-state">No chats yet. Create one!</div>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area" id="chatArea">
            <div class="chat-header" id="chatHeader" style="display:none;">
                <div class="chat-header-info">
                    <div class="chat-header-name" id="roomName">Select a chat</div>
                </div>
                <div class="chat-header-actions">
                    <button onclick="leaveRoom()" class="icon-btn"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>

            <div class="messages" id="messages">
                <div class="placeholder">Select a chat to start messaging</div>
            </div>

            <div class="input-area" id="inputArea" style="display:none;">
                <input type="text" id="msgInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendMessage()">
                <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script src="chat.js"></script>
</body>
</html>
