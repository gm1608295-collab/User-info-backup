<!DOCTYPE html>
<html>
<head>
    <title>Login System</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h2 { text-align: center; color: #333; margin-bottom: 30px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px 0;
        }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .row-buttons { display: flex; gap: 10px; margin: 15px 0; }
        .row-buttons button { background: white; color: #667eea; border: 1px solid #667eea; margin: 0; }
        .link { text-align: center; margin-top: 15px; }
        .link a { color: #667eea; cursor: pointer; text-decoration: none; }
        .message { text-align: center; padding: 10px; margin-top: 10px; border-radius: 8px; }
        .error { background: #fee; color: #c33; }
        .success { background: #efe; color: #3c3; }
        .admin-link { text-align: center; margin-top: 20px; padding-top: 15px; border-top: 1px solid #eee; }
        .admin-link a { color: #e74c3c; font-size: 12px; text-decoration: none; }
        .captcha-container { display: flex; justify-content: center; margin: 15px 0; }
        .forgot-link { text-align: right; margin-top: -5px; margin-bottom: 10px; }
        .forgot-link a { font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <div id="loginView">
            <h2>Sign in</h2>
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPassword" placeholder="Password">
            <div class="forgot-link"><a onclick="showForgot()">Forgot password?</a></div>
            <div class="captcha-container">
                <div class="g-recaptcha" data-sitekey="6LcobYosAAAAAEfs-2onaMV2C86o_yE06JeA90vw" data-callback="onLoginCaptcha"></div>
            </div>
            <button id="loginBtn" disabled onclick="doLogin()">Sign in</button>
            <div class="row-buttons">
                <button onclick="doGuest()">Guest</button>
                <button onclick="window.location.href='/auth/google'">Google</button>
            </div>
            <div class="link"><a onclick="showSignup()">Create account</a></div>
            <div class="admin-link"><a href="/admin-login.html">🔐 Admin Access</a></div>
        </div>
        
        <div id="signupView" style="display:none">
            <h2>Create account</h2>
            <input type="text" id="signupUsername" placeholder="Username">
            <input type="tel" id="signupPhone" placeholder="Phone">
            <input type="email" id="signupEmail" placeholder="Email">
            <input type="password" id="signupPassword" placeholder="Password">
            <input type="password" id="signupConfirm" placeholder="Confirm password">
            <div class="captcha-container">
                <div class="g-recaptcha" data-sitekey="6LcobYosAAAAAEfs-2onaMV2C86o_yE06JeA90vw" data-callback="onSignupCaptcha"></div>
            </div>
            <button id="signupBtn" disabled onclick="doSignup()">Sign up</button>
            <div class="link"><a onclick="showLogin()">Back to sign in</a></div>
        </div>
        
        <div id="forgotView" style="display:none">
            <h2>Reset password</h2>
            <input type="email" id="forgotEmail" placeholder="Email">
            <button onclick="doForgot()">Send reset link</button>
            <div class="link"><a onclick="showLogin()">Back to sign in</a></div>
        </div>
        
        <div id="message" class="message"></div>
    </div>

    <script>
        let loginCaptchaToken = null;
        let signupCaptchaToken = null;
        
        function onLoginCaptcha(token) {
            loginCaptchaToken = token;
            document.getElementById('loginBtn').disabled = false;
        }
        
        function onSignupCaptcha(token) {
            signupCaptchaToken = token;
            document.getElementById('signupBtn').disabled = false;
        }
        
        async function doLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showMsg('Fill all fields', 'error');
                return;
            }
            
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (data.token) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('role', data.role);
                    showMsg('Login successful! Redirecting...', 'success');
                    setTimeout(() => { window.location.href = '/dashboard.html'; }, 1000);
                } else {
                    showMsg(data.error, 'error');
                }
            } catch (err) {
                showMsg('Network error', 'error');
            }
        }
        
        async function doSignup() {
            const username = document.getElementById('signupUsername').value;
            const phone = document.getElementById('signupPhone').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const confirm = document.getElementById('signupConfirm').value;
            
            if (!email || !password) {
                showMsg('Email and password required', 'error');
                return;
            }
            if (password !== confirm) {
                showMsg('Passwords do not match', 'error');
                return;
            }
            
            try {
                const res = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, phone, email, password, confirmPassword: confirm })
                });
                const data = await res.json();
                if (data.message) {
                    showMsg(data.message, 'success');
                    setTimeout(() => showLogin(), 2000);
                } else {
                    showMsg(data.error, 'error');
                }
            } catch (err) {
                showMsg('Network error', 'error');
            }
        }
        
        async function doGuest() {
            const res = await fetch('/api/guest', { method: 'POST' });
            const data = await res.json();
            if (data.token) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('role', data.role);
                window.location.href = '/dashboard.html';
            }
        }
        
        async function doForgot() {
            const email = document.getElementById('forgotEmail').value;
            if (!email) { showMsg('Enter email', 'error'); return; }
            const res = await fetch('/api/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const data = await res.json();
            showMsg(data.message, 'success');
            setTimeout(() => showLogin(), 2000);
        }
        
        function showMsg(msg, type) {
            const m = document.getElementById('message');
            m.className = 'message ' + type;
            m.innerText = msg;
            setTimeout(() => { m.innerText = ''; }, 3000);
        }
        
        function showLogin() {
            document.getElementById('loginView').style.display = 'block';
            document.getElementById('signupView').style.display = 'none';
            document.getElementById('forgotView').style.display = 'none';
        }
        
        function showSignup() {
            document.getElementById('loginView').style.display = 'none';
            document.getElementById('signupView').style.display = 'block';
            document.getElementById('forgotView').style.display = 'none';
        }
        
        function showForgot() {
            document.getElementById('loginView').style.display = 'none';
            document.getElementById('signupView').style.display = 'none';
            document.getElementById('forgotView').style.display = 'block';
        }
        
        if (localStorage.getItem('token')) {
            window.location.href = '/dashboard.html';
        }
    </script>
</body>
</html>
