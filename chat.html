<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cross-Platform Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ==================== CSS (Cross-Platform) ==================== */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: #0f1123; color: #fff; height: 100vh; overflow: hidden; }
        .app-container { display: flex; height: 100vh; }

        /* Sidebar */
        .sidebar { width: 280px; background: #1a1f4b; border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .sidebar-header h2 { font-size: 18px; color: #f39c12; }
        .new-chat-btn { width: 36px; height: 36px; border-radius: 50%; border: none; background: #f39c12; color: #000; font-size: 16px; cursor: pointer; }

        .room-list { flex: 1; overflow-y: auto; padding: 10px; }
        .room-item { padding: 12px 14px; border-radius: 10px; cursor: pointer; transition: 0.2s; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .room-item:hover { background: rgba(255,255,255,0.04); }
        .room-item .room-name { font-size: 14px; font-weight: 600; }
        .room-item .room-last { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 4px; }
        .empty-state { text-align: center; color: rgba(255,255,255,0.2); padding: 40px 10px; font-size: 12px; }

        /* Chat Area */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #0f1123; }
        .chat-header { padding: 12px 20px; background: #1a1f4b; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
        .chat-header-name { font-size: 16px; font-weight: 600; }
        .icon-btn { background: rgba(255,255,255,0.05); border: none; color: #fff; padding: 6px 12px; border-radius: 6px; cursor: pointer; }

        .messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 6px; }
        .msg-row { display: flex; max-width: 75%; margin-bottom: 4px; }
        .msg-row.mine { align-self: flex-end; flex-direction: row-reverse; }
        .msg-bubble { padding: 8px 12px; border-radius: 12px; font-size: 14px; line-height: 1.4; word-break: break-word; }
        .msg-row.other .msg-bubble { background: rgba(255,255,255,0.08); border-bottom-left-radius: 4px; }
        .msg-row.mine .msg-bubble { background: #f39c12; color: #000; border-bottom-right-radius: 4px; }
        .msg-username { font-size: 11px; font-weight: 600; color: #f39c12; margin-bottom: 3px; }
        .msg-time { font-size: 10px; color: rgba(255,255,255,0.4); text-align: right; margin-top: 4px; }
        .placeholder { text-align: center; color: rgba(255,255,255,0.2); padding: 40px; font-size: 14px; }

        /* Input Area */
        .input-area { padding: 12px 20px; background: #1a1f4b; display: flex; gap: 10px; border-top: 1px solid rgba(255,255,255,0.05); }
        .input-area input { flex: 1; padding: 12px 16px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #fff; outline: none; font-size: 14px; }
        .input-area input:focus { border-color: #f39c12; }
        .send-btn { width: 44px; height: 44px; border-radius: 50%; border: none; background: #f39c12; color: #000; font-size: 18px; cursor: pointer; }

        /* ==================== Responsive (Phone/Tablet/Desktop) ==================== */
        @media (max-width: 768px) { .sidebar { width: 100%; height: 45vh; border-bottom: 1px solid rgba(255,255,255,0.05); } .app-container { flex-direction: column; } .chat-area { height: 55vh; } }
        @media (min-width: 769px) and (max-width: 1024px) { .sidebar { width: 250px; } }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>💬 Chats</h2>
                <button class="new-chat-btn" onclick="createRoom()"><i class="fas fa-plus"></i></button>
            </div>
            <div class="room-list" id="roomList">
                <div class="empty-state">No chats yet. Create one!</div>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area" id="chatArea">
            <div class="chat-header" id="chatHeader" style="display:none;">
                <div class="chat-header-info">
                    <div class="chat-header-name" id="roomName">Select a chat</div>
                </div>
                <div class="chat-header-actions">
                    <button onclick="leaveRoom()" class="icon-btn"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>

            <div class="messages" id="messages">
                <div class="placeholder">Select a chat to start messaging</div>
            </div>

            <div class="input-area" id="inputArea" style="display:none;">
                <input type="text" id="msgInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendMessage()">
                <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script>
        // ==================== JS (Cross-Platform) ====================
        const socket = io(); // ✅ HTTPS အတွက် auto-detect
        let currentUserId = null;
        let currentRoomId = null;

        // 1. Auto Login on Load
        socket.on('connect', () => {
            socket.emit('login', { username: 'TestUser_' + Math.floor(Math.random() * 1000) });
        });

        socket.on('login_success', (data) => {
            currentUserId = data.userId;
            console.log('Logged in as:', data.username);
        });

        // 2. Room List
        socket.on('room_list', (rooms) => {
            const list = document.getElementById('roomList');
            if (rooms.length === 0) {
                list.innerHTML = '<div class="empty-state">No chats yet. Create one!</div>';
                return;
            }
            list.innerHTML = rooms.map(r => `
                <div class="room-item" onclick="joinRoom(${r.id})">
                    <div class="room-name">${r.name}</div>
                    <div class="room-last">${r.lastMessage}</div>
                </div>
            `).join('');
        });

        socket.on('room_list_update', () => {
            socket.emit('get_rooms');
        });

        // 3. Create Room
        function createRoom() {
            const name = prompt('Enter room name:');
            if (name) socket.emit('create_room', { roomName: name });
        }

        // 4. Join Room
        function joinRoom(roomId) {
            currentRoomId = roomId;
            socket.emit('join_room', roomId);
        }

        socket.on('room_joined', (data) => {
            document.getElementById('chatHeader').style.display = 'flex';
            document.getElementById('inputArea').style.display = 'flex';
            document.getElementById('roomName').textContent = data.room.name;
            
            const msgContainer = document.getElementById('messages');
            msgContainer.innerHTML = '';
            data.messages.forEach(msg => addMessage(msg));
        });

        // 5. Send Message
        function sendMessage() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text || !currentRoomId) return;
            socket.emit('send_message', { roomId: currentRoomId, message: text });
            input.value = '';
        }

        // 6. Receive Message
        socket.on('new_message', (msg) => {
            if (currentRoomId === msg.roomId) {
                addMessage(msg);
            }
        });

        function addMessage(msg) {
            const container = document.getElementById('messages');
            const div = document.createElement('div');
            const isMine = msg.senderId === currentUserId;
            div.className = `msg-row ${isMine ? 'mine' : 'other'}`;
            div.innerHTML = `
                <div class="msg-bubble">
                    ${!isMine ? `<div class="msg-username">${msg.username}</div>` : ''}
                    <div>${msg.text}</div>
                    <div class="msg-time">${new Date(msg.timestamp).toLocaleTimeString()}</div>
                </div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        // 7. Leave Room
        function leaveRoom() {
            currentRoomId = null;
            document.getElementById('chatHeader').style.display = 'none';
            document.getElementById('inputArea').style.display = 'none';
            document.getElementById('messages').innerHTML = '<div class="placeholder">Select a chat to start messaging</div>';
            socket.emit('get_rooms');
        }
    </script>
</body>
  </html>
